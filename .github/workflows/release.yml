name: Release (signed)

# Builds the published binaries on a version tag, submits the Windows build to
# SignPath for signing, and attaches the SIGNED artifact to the GitHub Release.
#
# Signing happens here (on a tag), NOT in build.yml (on every push/PR), because
# the SignPath Foundation requires each release to be manually approved before
# signing. See the "Code signing policy" section in README.md.
#
# ── Before this works, set these in the repo (Settings → Secrets/Variables) ──
#   Secret   SIGNPATH_API_TOKEN          – API token from your SignPath account
#   Variable SIGNPATH_ORGANIZATION_ID    – GUID of your SignPath organization
#   Variable SIGNPATH_PROJECT_SLUG       – e.g. "Genie5"
#   Variable SIGNPATH_SIGNING_POLICY     – e.g. "release-signing"  (Foundation tier)
# The project + an "artifact configuration" must first be created in the SignPath
# web UI; the artifact-configuration-slug below must match it.

on:
  push:
    tags: ["v*"]          # e.g. v5.0.0-alpha.1
  workflow_dispatch:       # allow manual runs from the Actions tab

permissions:
  contents: write          # needed to create/update the GitHub Release
  id-token: write          # SignPath uses GitHub's OIDC token for origin verification

jobs:
  publish:
    name: Publish self-contained win-x64
    runs-on: windows-latest
    outputs:
      unsigned-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish self-contained win-x64
        run: |
          dotnet publish src/Genie.App/Genie.App.csproj `
            -c Release -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o publish/win-x64

      # SignPath pulls the binary from a GitHub Actions artifact, so upload it.
      - name: Upload unsigned artifact
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: genie-win-x64-unsigned
          path: publish/win-x64/Genie.exe
          if-no-files-found: error

  sign:
    name: Sign with SignPath Foundation
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - name: Submit signing request
        id: signpath
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY }}
          # Must match the artifact configuration you create in the SignPath UI:
          artifact-configuration-slug: genie-win-x64
          github-artifact-id: ${{ needs.publish.outputs.unsigned-artifact-id }}
          wait-for-completion: true      # block until a Reviewer/Approver signs it
          output-artifact-directory: signed

      - name: Upload signed artifact
        uses: actions/upload-artifact@v4
        with:
          name: genie-win-x64-signed
          path: signed/**

  release:
    name: Attach signed binary to GitHub Release
    runs-on: ubuntu-latest
    needs: sign
    steps:
      - name: Download signed artifact
        uses: actions/download-artifact@v4
        with:
          name: genie-win-x64-signed
          path: signed

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: signed/**
          generate_release_notes: true
          # Reminder: the Release body must mention SignPath, e.g.
          #   "Windows builds are signed via SignPath.io, certificate by the
          #    SignPath Foundation." (see README → Code signing policy)
